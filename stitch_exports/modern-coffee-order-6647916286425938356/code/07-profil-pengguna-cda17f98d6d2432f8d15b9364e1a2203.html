<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#2b2d2d",
                        "surface-container-low": "#faf2f0",
                        "secondary-container": "#ece0dc",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#161819",
                        "surface": "#fff8f6",
                        "on-tertiary-fixed-variant": "#454747",
                        "inverse-on-surface": "#f7efee",
                        "on-surface": "#1e1b1a",
                        "on-secondary-fixed": "#201a18",
                        "on-background": "#1e1b1a",
                        "secondary": "#655d5a",
                        "on-secondary": "#ffffff",
                        "primary-container": "#3e2723",
                        "outline-variant": "#d3c3c0",
                        "on-secondary-container": "#6b6360",
                        "surface-variant": "#e8e1df",
                        "on-primary-container": "#ae8d87",
                        "surface-dim": "#e0d8d7",
                        "primary-fixed-dim": "#e3beb8",
                        "on-tertiary-fixed": "#1a1c1c",
                        "surface-container-high": "#eee6e5",
                        "on-primary-fixed-variant": "#5b403c",
                        "surface-tint": "#745853",
                        "surface-bright": "#fff8f6",
                        "primary": "#271310",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#33302f",
                        "secondary-fixed": "#ece0dc",
                        "secondary-fixed-dim": "#cfc4c0",

                    },
                    "spacing": {
                        "unit": "8px",
                        "stack-lg": "32px",
                        "section-gap": "48px",
                        "stack-md": "16px",
                        "gutter": "16px",
                        "container-padding": "24px",
                        "stack-sm": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "label-lg": ["Plus Jakarta Sans"],
                        "headline-xl": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.04em", "fontWeight": "500"}]
                    }
                },
            },
        }

<style>
        body {
            background-color: #fff8f6;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(232, 225, 223, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="min-h-screen text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full px-6 py-4 flex justify-between items-center bg-stone-50/80 backdrop-blur-md z-50 shadow-sm shadow-stone-900/5">
<button class="active:scale-95 duration-200 transition-opacity hover:opacity-80">
<span class="material-symbols-outlined text-stone-900" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-semibold text-lg tracking-tight text-stone-900">Profile</h1>
<button class="active:scale-95 duration-200 transition-opacity hover:opacity-80">
<span class="material-symbols-outlined text-stone-900" data-icon="settings">settings</span>
</button>
</header>
<main class="pt-24 pb-32 px-container-padding max-w-2xl mx-auto">
<!-- User Profile Header Section -->
<section class="flex flex-col items-center text-center mb-stack-lg">
<div class="relative mb-stack-md">
<div class="w-28 h-28 rounded-full overflow-hidden border-4 border-white shadow-lg shadow-primary-container/10">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a professional man in a sunlit cafe setting, soft bokeh background of espresso machines" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC2uM93Sd6gohVAGb2lyBpndvnT4HB56lYewn5d8XA4fVscvLj6mfI-1TLjKZySjfpSOZU1mFPAV8cb-JEzpo0j1W2PL6LP6mu8kRlWdHKqCWMug-VTvJ8dt4oSMncE0OgTToGz_ukGhQrKMq1Hog9GD_RiquEa1JLKH4XW0dldkn3HK-XaL2vsxeOZBkteBYYzJD9vKuihW8GnzWo3F8Uwfdau0_Yibd6zjqncuPcLmcR6pmUyVU1RTjCceRnxg7zaqr7gaSIP0Ow"/>
</div>
<button class="absolute bottom-0 right-0 bg-primary-container p-2 rounded-full text-white shadow-md active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[18px]" data-icon="edit">edit</span>
</button>
</div>
<h2 class="font-headline-lg text-headline-lg text-primary">Julian Henderson</h2>
<p class="font-body-md text-body-md text-secondary">julian.h@slowbar.co</p>
<div class="mt-stack-md flex gap-stack-sm">
<div class="bg-secondary-container px-4 py-1.5 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-primary" data-icon="stars" data-weight="fill" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="font-label-sm text-label-sm text-primary">Gold Member</span>
</div>
<div class="bg-surface-container-highest px-4 py-1.5 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-primary" data-icon="coffee" data-weight="fill" style="font-variation-settings: 'FILL' 1;">coffee</span>
<span class="font-label-sm text-label-sm text-primary">120 Beans</span>
</div>
</div>
</section>
<!-- Bento Grid Settings Layout -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<!-- Personal Info Card -->
<button class="glass-card p-stack-md rounded-[24px] flex flex-col items-start text-left hover:bg-white transition-all duration-300 group active:scale-[0.98]">
<div class="bg-primary-container/10 p-3 rounded-xl mb-4 group-hover:bg-primary-container group-hover:text-white transition-colors">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
<h3 class="font-headline-md text-headline-md text-primary mb-1">Personal Information</h3>
<p class="font-body-md text-secondary text-sm">Update your name, email, and mobile number</p>
</button>
<!-- Payment Methods Card -->
<button class="glass-card p-stack-md rounded-[24px] flex flex-col items-start text-left hover:bg-white transition-all duration-300 group active:scale-[0.98]">
<div class="bg-primary-container/10 p-3 rounded-xl mb-4 group-hover:bg-primary-container group-hover:text-white transition-colors">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
</div>
<h3 class="font-headline-md text-headline-md text-primary mb-1">Payment Methods</h3>
<p class="font-body-md text-secondary text-sm">Visa ending in 4242 and SlowBar Credits</p>
</button>
<!-- Notification Settings Card -->
<button class="glass-card p-stack-md rounded-[24px] flex flex-col items-start text-left hover:bg-white transition-all duration-300 group active:scale-[0.98]">
<div class="bg-primary-container/10 p-3 rounded-xl mb-4 group-hover:bg-primary-container group-hover:text-white transition-colors">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</div>
<h3 class="font-headline-md text-headline-md text-primary mb-1">Notification Settings</h3>
<p class="font-body-md text-secondary text-sm">Manage order alerts and artisanal promotions</p>
</button>
<!-- Help Center Card -->
<button class="glass-card p-stack-md rounded-[24px] flex flex-col items-start text-left hover:bg-white transition-all duration-300 group active:scale-[0.98]">
<div class="bg-primary-container/10 p-3 rounded-xl mb-4 group-hover:bg-primary-container group-hover:text-white transition-colors">
<span class="material-symbols-outlined" data-icon="help_center">help_center</span>
</div>
<h3 class="font-headline-md text-headline-md text-primary mb-1">Help Center</h3>
<p class="font-body-md text-secondary text-sm">FAQs, live support, and order issues</p>
</button>
</div>
<!-- Logout Section -->
<div class="mt-stack-lg pt-stack-lg border-t border-outline-variant/30">
<button class="w-full py-4 px-6 rounded-[24px] border border-error/20 flex items-center justify-center gap-3 text-error hover:bg-error/5 transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
<span class="font-label-lg text-label-lg">Logout</span>
</button>
</div>
<!-- Promo Banner (Contextual) -->
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pt-3 pb-8 bg-white/90 backdrop-blur-xl rounded-t-[32px] shadow-[0_-8px_32px_rgba(62,39,35,0.06)] border-t border-stone-100">
<!-- Home -->
<button class="flex flex-col items-center justify-center text-stone-400 px-5 py-2 hover:text-[#3E2723] transition-colors active:scale-90 duration-300 ease-out">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium uppercase tracking-widest mt-1">Home</span>
</button>
<!-- Orders -->
<button class="flex flex-col items-center justify-center text-stone-400 px-5 py-2 hover:text-[#3E2723] transition-colors active:scale-90 duration-300 ease-out">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium uppercase tracking-widest mt-1">Orders</span>
</button>
<!-- Profile (Active State) -->
<button class="flex flex-col items-center justify-center text-[#3E2723] bg-[#EFEBE9] rounded-[16px] px-5 py-2 active:scale-90 transition-transform duration-300 ease-out">
<span class="material-symbols-outlined" data-icon="person" data-weight="fill" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold uppercase tracking-widest mt-1">Profile</span>
</button>
</nav>
</body></html>
