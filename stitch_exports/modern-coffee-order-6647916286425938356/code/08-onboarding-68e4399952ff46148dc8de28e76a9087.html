</div>

<div class="relative z-10 px-container-padding pb-24 md:pb-32 flex flex-col items-center text-center max-w-2xl mx-auto">

<div class="mb-stack-md">
<span class="inline-flex items-center justify-center w-12 h-12 rounded-[16px] bg-white/10 backdrop-blur-md border border-white/20">
<span class="material-symbols-outlined text-white text-[24px]" data-icon="coffee_maker">coffee_maker</span>
</span>
</div>
<!-- Hero Text -->
<h1 class="font-headline-xl text-white mb-stack-md leading-tight">
        Temukan Kopi <br/> Terbaikmu
      </h1>
<p class="font-body-lg text-white/80 mb-stack-lg max-w-[280px] md:max-w-md mx-auto">
        Nikmati pengalaman Slow Bar yang menenangkan dengan biji kopi pilihan terbaik.
      </p>
<!-- Action Area -->
<div class="w-full flex flex-col gap-4">
<button class="w-full py-4 bg-primary-container text-white rounded-[20px] font-headline-md shadow-[0_32px_64px_rgba(39,19,16,0.15)] flex items-center justify-center gap-2 group transition-all active:scale-95">

</button>
<button class="w-full py-4 bg-white/10 backdrop-blur-xl border border-white/20 text-white rounded-[20px] font-label-lg transition-all hover:bg-white/20 active:scale-95">

        </button>
</div>

</div>
