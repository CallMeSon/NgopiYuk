<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>

</div>
<div class="relative">

<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-12 focus:ring-2 focus:ring-primary-container font-body-md text-on-surface placeholder:text-outline-variant transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>

<button class="w-full bg-primary-container text-on-primary py-4 rounded-xl font-label-lg text-label-lg shadow-lg active:scale-[0.98] transition-transform mt-4">
